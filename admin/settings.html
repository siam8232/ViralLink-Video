<!-- admin/settings.html -->
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সাইট সেটিংস - ViralLink Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin-style.css">
    <style>
        .settings-card { background: #252525; padding: 30px; border-radius: 15px; border: 1px solid #333; max-width: 700px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: gold; font-weight: 600; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; outline: none; }
        .save-btn { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="admin-loading"><h2>চেক করা হচ্ছে...</h2></div>

    <div class="sidebar">
        <h2>ViralLink Admin</h2>
        <a href="index.html" class="menu-item"><i class="fas fa-home"></i> ড্যাশবোর্ড</a>
        <a href="add-video.html" class="menu-item"><i class="fas fa-plus-circle"></i> ভিডিও যোগ করুন</a>
        <a href="all-videos.html" class="menu-item"><i class="fas fa-video"></i> সব ভিডিও</a>
        <a href="categories.html" class="menu-item"><i class="fas fa-list"></i> ক্যাটাগরি</a>
        <a href="users.html" class="menu-item"><i class="fas fa-users"></i> ইউজার লিস্ট</a>
        <a href="payments.html" class="menu-item"><i class="fas fa-money-bill-wave"></i> পেমেন্ট রিকোয়েস্ট</a>
        <a href="ads.html" class="menu-item"><i class="fas fa-ad"></i> অ্যাড ম্যানেজার</a>
        <a href="seo.html" class="menu-item"><i class="fas fa-search"></i> SEO সেটিংস</a>
        <a href="settings.html" class="menu-item active"><i class="fas fa-cog"></i> ওয়েবসাইট সেটিংস</a>
        <a href="/" class="menu-item" style="margin-top:50px; color:red;"><i class="fas fa-arrow-left"></i> ওয়েবসাইট দেখুন</a>
    </div>

    <div class="main-content">
        <h1>ওয়েবসাইট জেনারেল সেটিংস</h1>
        <p style="color: #888; margin-bottom: 30px;">এখান থেকে আপনার সাইটের নাম এবং লোগো নিয়ন্ত্রণ করুন।</p>

        <div class="settings-card">
            <form id="settings-form">
                <div class="form-group">
                    <label>ওয়েবসাইটের নাম (Site Name)</label>
                    <input type="text" id="site-name" placeholder="যেমন: ViralLink Video" required>
                </div>

                <div class="form-group">
                    <label>লোগো URL (ImageBB Link)</label>
                    <input type="url" id="site-logo" placeholder="আপনার লোগোর ডিরেক্ট লিঙ্ক দিন">
                </div>

                <div class="form-group">
                    <label>ফুটান টেক্সট (Footer Text)</label>
                    <input type="text" id="site-footer" placeholder="Copyright © 2024 ViralLink Video">
                </div>

                <button type="submit" class="save-btn">সেটিংস আপডেট করুন</button>
            </form>
        </div>
    </div>

    <script type="module" src="settings.js"></script>
</body>
</html>
