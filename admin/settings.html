<!-- admin/settings.html -->
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ওয়েবসাইট সেটিংস - ViralLink Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin-style.css">
    <style>
        .settings-card { background: #252525; padding: 30px; border-radius: 20px; border: 1px solid #333; max-width: 700px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: gold; font-weight: 600; }
        .save-btn { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; transition: 0.3s; }
        .save-btn:hover { background: #218838; transform: translateY(-2px); }
        .logo-preview { margin-top: 10px; height: 60px; background: #111; padding: 10px; border-radius: 10px; display: none; align-items: center; justify-content: center; border: 1px dashed #555; }
        .logo-preview img { height: 100%; width: auto; object-fit: contain; }
    </style>
</head>
<body>

    <div id="admin-loading">
        <h2 style="color: white;">চেক করা হচ্ছে... 🛡️</h2>
    </div>

    <!-- সাইডবার (সিরিয়াল অনুযায়ী) -->
    <div class="sidebar">
        <h2>ViralLink Admin</h2>
        <a href="index.html" class="menu-item"><i class="fas fa-home"></i> <span>ড্যাশবোর্ড</span></a>
        <a href="add-video.html" class="menu-item"><i class="fas fa-plus-circle"></i> <span>ভিডিও যোগ করুন</span></a>
        <a href="all-videos.html" class="menu-item"><i class="fas fa-video"></i> <span>সব ভিডিও</span></a>
        <a href="categories.html" class="menu-item"><i class="fas fa-list"></i> <span>ক্যাটাগরি</span></a>
        <a href="users.html" class="menu-item"><i class="fas fa-users"></i> <span>ইউজার লিস্ট</span></a>
        <a href="payments.html" class="menu-item"><i class="fas fa-money-bill-wave"></i> <span>পেমেন্ট রিকোয়েস্ট</span></a>
        <a href="ads.html" class="menu-item"><i class="fas fa-ad"></i> <span>অ্যাড ম্যানেজার</span></a>
        <a href="seo.html" class="menu-item"><i class="fas fa-search"></i> <span>SEO সেটিংস</span></a>
        <a href="settings.html" class="menu-item active"><i class="fas fa-cog"></i> <span>ওয়েবসাইট সেটিংস</span></a>
        <a href="/" class="menu-item" style="margin-top:20px; color:#ff4d4d; border: 1px solid #333;"><i class="fas fa-arrow-left"></i> <span>ওয়েবসাইট দেখুন</span></a>
    </div>

    <div class="main-content">
        <h1>সাধারণ ওয়েবসাইট সেটিংস</h1>
        <p style="color: #888; margin-bottom: 30px;">আপনার ব্র্যান্ডের নাম, লোগো এবং ফুটান টেক্সট এখান থেকে নিয়ন্ত্রণ করুন।</p>

        <div class="settings-card">
            <form id="settings-form">
                <!-- সাইট নাম -->
                <div class="form-group">
                    <label>ওয়েবসাইটের নাম (Site Name)</label>
                    <input type="text" id="site-name" placeholder="যেমন: ViralLink Video" required>
                </div>

                <!-- লোগো লিঙ্ক -->
                <div class="form-group">
                    <label>লোগো URL (ImageBB ডিরেক্ট লিঙ্ক)</label>
                    <input type="text" id="site-logo" placeholder="আপনার লোগোর লিঙ্কটি এখানে দিন">
                    <div id="p-box" class="logo-preview"><img id="p-img"></div>
                </div>

                <!-- ফুটার টেক্সট -->
                <div class="form-group">
                    <label>ফুটান টেক্সট (Footer Text)</label>
                    <input type="text" id="site-footer" placeholder="যেমন: Copyright © 2024 ViralLink Video">
                </div>

                <button type="submit" class="save-btn">সেটিংস আপডেট করুন 🎉</button>
            </form>
        </div>
    </div>

    <!-- অ্যাডমিন লজিক কানেক্ট করা -->
    <script type="module" src="admin.js"></script>
    <script type="module" src="settings.js"></script>

</body>
</html>
