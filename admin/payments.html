<!DOCTYPE html>
<html lang="bn">
<head>

    <link rel="stylesheet" href="admin-style.css">
    <style>
        .approve-btn { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .reject-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; margin-left: 5px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }

<body>

        <a href="add-video.html" class="menu-item"><i class="fas fa-plus-circle"></i> <span>ভিডিও যোগ করুন</span></a>

        <table id="payments-table">
            <thead>
                <tr>
                    <th>ইউজার</th>
                    <th>প্ল্যান (টাকা)</th>

                    <th>TrxID</th>
                    <th>স্ট্যাটাস</th>
                    <th>অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="admin-payment-list">
                <!-- পেমেন্ট রিকোয়েস্ট এখানে লোড হবে -->
            </tbody>
        </table>
