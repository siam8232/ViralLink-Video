<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Membership</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .plans-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .plan-card { background: #111; padding: 15px 5px; border-radius: 12px; border: 2px solid #222; text-align: center; cursor: pointer; }
        .plan-card.active { border-color: gold; background: #1a1a00; }
        .price { font-weight: 700; color: gold; font-size: 1.1rem; }
        .payment-box { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222; }
        .methods-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .method-card { background: #fff; height: 60px; border-radius: 10px; border: 3px solid transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .method-card.active { border-color: red; }
        .method-card img { height: 35px; object-fit: contain; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; margin-bottom: 15px; }
        .btn-submit { background: red; color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center; color:red;">Premium</h1>
        <div class="plans-grid">
            <div class="plan-card" onclick="selectPlan('Monthly', 50, this)"><h3>1M</h3><p class="price">50৳</p></div>
            <div class="plan-card" onclick="selectPlan('3 Months', 100, this)"><h3>3M</h3><p class="price">100৳</p></div>
            <div class="plan-card" onclick="selectPlan('Yearly', 200, this)"><h3>1Y</h3><p class="price">200৳</p></div>
        </div>
        <div class="payment-box">
            <p style="text-align:center; font-size:0.8rem; color:#888;">Send Money to: <b style="color:red;">01767944778</b></p>
            <div class="methods-grid">
                <div class="method-card" onclick="selectMethod('bKash', this)"><img src="https://raw.githubusercontent.com/SiamIslam-Dev/ViralLink-Assets/main/bkash.png"></div>
                <div class="method-card" onclick="selectMethod('Nagad', this)"><img src="https://raw.githubusercontent.com/SiamIslam-Dev/ViralLink-Assets/main/nagad.png"></div>
            </div>
            <form id="payment-form">
                <input type="text" id="sender-num" placeholder="Your Number" required>
                <input type="text" id="trx-id" placeholder="Transaction ID" required>
                <input type="hidden" id="selected-plan"><input type="hidden" id="selected-price"><input type="hidden" id="selected-method">
                <button type="submit" class="btn-submit">Submit Request</button>
            </form>
        </div>
    </div>
    <script>
        function selectPlan(plan, price, el) { document.querySelectorAll('.plan-card').forEach(x=>x.classList.remove('active')); el.classList.add('active'); document.getElementById('selected-plan').value=plan; document.getElementById('selected-price').value=price; }
        function selectMethod(m, el) { document.querySelectorAll('.method-card').forEach(x=>x.classList.remove('active')); el.classList.add('active'); document.getElementById('selected-method').value=m; }
    </script>
    <script type="module" src="./js/premium.js"></script>
</body>
</html>
