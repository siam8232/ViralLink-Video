<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন ভিডিও যোগ করুন - ViralLink Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div id="admin-loading"><h2>চেক করা হচ্ছে...</h2></div>
    <div class="sidebar">
        <h2>ViralLink Admin</h2>
        <a href="index.html" class="menu-item"><i class="fas fa-home"></i> ড্যাশবোর্ড</a>
        <a href="add-video.html" class="menu-item active"><i class="fas fa-plus-circle"></i> ভিডিও যোগ করুন</a>
        <a href="all-videos.html" class="menu-item"><i class="fas fa-video"></i> সব ভিডিও</a>
        <a href="categories.html" class="menu-item"><i class="fas fa-list"></i> ক্যাটাগরি</a>
        <a href="users.html" class="menu-item"><i class="fas fa-users"></i> ইউজার লিস্ট</a>
        <a href="payments.html" class="menu-item"><i class="fas fa-money-bill-wave"></i> পেমেন্ট রিকোয়েস্ট</a>
        <a href="ads.html" class="menu-item"><i class="fas fa-ad"></i> অ্যাড ম্যানেজার</a>
        <a href="seo.html" class="menu-item"><i class="fas fa-search"></i> SEO সেটিংস</a>
        <a href="settings.html" class="menu-item"><i class="fas fa-cog"></i> ওয়েবসাইট সেটিংস</a>
        <a href="/" class="menu-item" style="margin-top:50px; color:red;"><i class="fas fa-arrow-left"></i> ওয়েবসাইট দেখুন</a>
    </div>
    <div class="main-content">
        <h1>নতুন ভিডিও যোগ করুন</h1>
        <form id="video-form" style="max-width: 800px; background: #252525; padding: 30px; border-radius: 15px;">
            <div style="margin-bottom:20px;">
                <label style="display:block; margin-bottom:5px;">ভিডিওর টাইটেল</label>
                <input type="text" id="v-title" style="width:100%; padding:12px; border-radius:8px; background:#111; color:white; border:1px solid #444;" required>
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; margin-bottom:5px;">ক্যাটাগরি</label>
                <select id="v-category" style="width:100%; padding:12px; border-radius:8px; background:#111; color:white; border:1px solid #444;" required></select>
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; margin-bottom:5px;">ভিডিও লিঙ্ক অথবা Embed Code</label>
                <input type="text" id="video-data" placeholder="এখানে লিঙ্ক বা কোড দিন" style="width:100%; padding:12px; border-radius:8px; background:#111; color:white; border:1px solid #444;" required>
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; margin-bottom:5px;">ImageBB থাম্বনেইল লিঙ্ক</label>
                <input type="text" id="v-thumb" style="width:100%; padding:12px; border-radius:8px; background:#111; color:white; border:1px solid #444;" required>
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; margin-bottom:5px;">ডেসক্রিপশন</label>
                <textarea id="v-desc" rows="4" style="width:100%; padding:12px; border-radius:8px; background:#111; color:white; border:1px solid #444;"></textarea>
            </div>
            <button type="submit" style="width:100%; padding:15px; background:red; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">ভিডিও পাবলিশ করুন</button>
        </form>
    </div>
    <script type="module" src="video-manager.js"></script>
</body>
</html>
