<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralLink Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #000; color: white; padding-bottom: 50px; overflow-x: hidden; }
        nav { background: #000; padding: 15px 5%; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo img { height: 45px; width: auto; }
        #user-section { display: flex; align-items: center; gap: 10px; }
        .search-container { background: #000; padding: 15px 5%; }
        .search-box { position: relative; max-width: 600px; margin: 0 auto; }
        .search-box input { width: 100%; padding: 12px 45px; border-radius: 25px; background: #111; border: 1px solid #333; color: white; outline: none; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #555; }
        .category-container { background: #000; padding: 10px 5%; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .cat-pill { background: #222; color: white; padding: 8px 18px; border-radius: 20px; cursor: pointer; border: 1px solid #333; font-size: 0.8rem; }
        .cat-pill.active { background: white; color: black; }
        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: #111; border-radius: 12px; overflow: hidden; text-decoration: none; color: white; display: block; border: 1px solid #222; transition: 0.3s; }
        .video-card:hover { border-color: red; transform: translateY(-5px); }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #222; }
        .thumbnail { width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 12px; }
        .video-info h3 { font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 600px) {
            nav { padding: 10px 15px; }
            .logo img { height: 35px; }
            .video-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .video-info h3 { font-size: 0.75rem; }
            .video-info p { font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <nav><a href="/" class="logo">লোগো লোড হচ্ছে...</a><div id="user-section"></div></nav>
    <div id="ad-banner-placeholder" style="text-align:center; margin: 10px 0;"></div>
    <div class="search-container"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="আপনার পছন্দের ভিডিও খুঁজুন..."></div></div>
    <div class="category-container" id="category-bar"><div class="cat-pill active" onclick="filterVideos('all', this)">সব ভিডিও</div></div>
    <div class="container"><div class="video-grid" id="video-list"></div></div>
    <script type="module" src="./js/auth.js"></script>
    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/ads-loader.js"></script>
</body>
</html>
