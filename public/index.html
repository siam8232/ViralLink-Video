<!-- public/index.html -->
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralLink Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #000; color: white; padding-bottom: 50px; }
        nav { background: #000; padding: 15px 5%; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: red; text-decoration: none; font-weight: bold; font-size: 1.5rem; }
        .search-container { background: #000; padding: 20px 5%; }
        .search-box { position: relative; max-width: 600px; margin: 0 auto; }
        .search-box input { width: 100%; padding: 12px 15px 12px 45px; border-radius: 25px; background: #111; border: 1px solid #333; color: white; outline: none; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #555; }
        .category-container { background: #000; padding: 10px 5%; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .cat-pill { background: #222; color: white; padding: 8px 18px; border-radius: 20px; cursor: pointer; border: 1px solid #333; }
        .cat-pill.active { background: white; color: black; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: #111; border-radius: 10px; overflow: hidden; text-decoration: none; color: white; display: block; }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #222; }
        .thumbnail { width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 12px; }
        .btn { background: red; color: white; padding: 5px 15px; border-radius: 5px; border: none; cursor: pointer; }

        /* নির্দেশনা বক্স */
        #ad-guide-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .modal-content { background: #111; border: 1px solid #333; padding: 30px; border-radius: 20px; max-width: 500px; text-align: center; }
        .step { text-align: left; background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="ad-guide-modal">
        <div class="modal-content">
            <h2 style="color:gold; margin-bottom:20px;">ভিডিও দেখার নিয়ম</h2>
            <div class="step"><b>১. ক্লিক করুন:</b> ভিডিওতে ক্লিক করলে অ্যাড আসতে পারে।</div>
            <div class="step"><b>২. ব্যাকে আসুন:</b> ফোনের Back বাটন চেপে আবার এখানে আসুন।</div>
            <div class="step"><b>৩. পুনরায় ক্লিক:</b> এবার ভিডিওটি প্লে হবে।</div>
            <button class="btn" style="width:100%; padding:15px; font-weight:bold; margin-top:10px;" id="understand-btn">ঠিক আছে, স্ট্রিমিং শুরু করুন</button>
        </div>
    </div>

    <nav>
        <a href="/" class="logo" id="site-name-nav">ViralLink Video</a>
        <div id="user-section">লোড হচ্ছে...</div>
    </nav>

    <div id="ad-banner-placeholder" style="text-align:center; margin: 10px 0;"></div>
    <div class="search-container"><div class="search-box"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="আপনার পছন্দের ভিডিও খুঁজুন..."></div></div>
    <div class="category-container" id="category-bar"><div class="cat-pill active" onclick="filterVideos('all', this)">সব ভিডিও</div></div>
    <div class="container"><div class="video-grid" id="video-list"></div></div>

    <script type="module" src="./js/auth.js"></script>
    <script type="module" src="./js/main.js"></script>
    <script type="module">
        import { initializeAds } from "./js/ads-loader.js";
        window.onload = () => { if(!sessionStorage.getItem('guideShown')) document.getElementById('ad-guide-modal').style.display='flex'; else initializeAds(); };
        document.getElementById('understand-btn').onclick = () => { document.getElementById('ad-guide-modal').style.display='none'; sessionStorage.setItem('guideShown','true'); initializeAds(); };
    </script>
</body>
</html>
